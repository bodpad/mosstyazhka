<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap">

  <style>
    :root {
      --color-dark:    #1A1A1A;
      --color-accent:  #F5C518;
      --color-cream:   #FAFAF8;
      --font-display:  'Manrope', system-ui, sans-serif;
      --font-display3: 'Rubik', system-ui, sans-serif;
      --font-logo:     'Manrope', 'Arial Narrow', sans-serif;

      --scale: 1;
      --bw: calc(1080px * var(--scale));
      --bh: calc(810px * var(--scale));
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #2a2a2a;
      font-family: var(--font-display);
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .banner {
      position: relative;
      width: var(--bw);
      height: var(--bh);
      background: #2a2a2a;
      overflow: hidden;
      color: var(--color-cream);
    }
  </style>
</head>
<body>

<div class="banner">
  <div style="position:absolute; inset:0; transform-origin:top left; transform:scale(var(--scale)); width:1080px; height:810px; display:flex; flex-direction:column;">

    <!-- ФОНОВЫЕ СЛОИ -->
    <div style="position:absolute; inset:0; background:url('./screed-photo.jpg') center/cover no-repeat; z-index:0;"></div>
    <div style="position:absolute; inset:0; z-index:0;
                background:
                  linear-gradient(180deg, rgba(26,26,26,0.5) 0, rgba(26,26,26,0) 220px),
                  linear-gradient(180deg, rgba(26,26,26,0) 430px, rgba(26,26,26,0.55) 600px, rgba(26,26,26,0.9) 810px),
                  rgba(26,26,26,0.5);"></div>

    <!-- ШАПКА: бренд │ город + герб -->
    <header style="flex:0 0 110px; background:var(--color-accent); display:flex; align-items:center; padding:0 72px; position:relative; z-index:2;">

      <!-- Левый блок: лого + название + подстрочник -->
      <div style="display:flex; align-items:center; gap:18px;">
        <svg width="140" height="36" viewBox="0 0 140 36" xmlns="http://www.w3.org/2000/svg">
          <g transform="translate(0, -20)">
            <rect x="0" y="20" width="140" height="36" rx="4" fill="#1A1A1A"/>
            <rect x="40" y="21" width="60" height="34" fill="#F5C518"/>
            <circle cx="70" cy="38" r="11" fill="#FAFAF8" stroke="#1A1A1A" stroke-width="1.5"/>
            <circle cx="70" cy="38" r="5" fill="none" stroke="#1A1A1A" stroke-width="1.5"/>
            <line x1="13" y1="20" x2="13" y2="28" stroke="#FAFAF8" stroke-width="1.5"/>
            <line x1="23" y1="20" x2="23" y2="28" stroke="#FAFAF8" stroke-width="1.5"/>
            <line x1="33" y1="20" x2="33" y2="28" stroke="#FAFAF8" stroke-width="1.5"/>
            <line x1="107" y1="20" x2="107" y2="28" stroke="#FAFAF8" stroke-width="1.5"/>
            <line x1="117" y1="20" x2="117" y2="28" stroke="#FAFAF8" stroke-width="1.5"/>
            <line x1="127" y1="20" x2="127" y2="28" stroke="#FAFAF8" stroke-width="1.5"/>
          </g>
        </svg>

        <div style="display:flex; flex-direction:column; gap:2px;">
          <div style="font-family:var(--font-logo); font-weight:700; font-size:34px; line-height:1; color:var(--color-dark);">МосСтяжка</div>
        </div>

        <!-- разделитель -->
        <div style="width:3px; height:54px; background:rgba(26,26,26,0.28); margin:0 6px;"></div>

        <!-- город -->
        <div style="display:flex; flex-direction:column; gap:2px;">
          <div style="font-family:var(--font-display3); font-weight:700; font-size:40px; line-height:1; color:var(--color-dark);position: relative;top:2px">Москва</div>
        </div>
      </div>

      <!-- Правый блок: герб -->
      <div style="margin-left:auto; display:flex; align-items:center; height:100%;">
        <img src="../coats-of-arms/moscow.svg" style="display:block; height:90px; width:auto;">
      </div>
    </header>

    <!-- ЦЕНТРАЛЬНАЯ ЗОНА -->
    <main style="flex:1 1 auto; position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:48px 60px 0; z-index:1;">
      <div style="display:flex; flex-direction:column; align-items:center; text-align:center; width:100%;">

        <div style="font-size:30px; opacity:0.85; margin-bottom:30px; letter-spacing:0.3px;">с фиброволокном · по СНиП · М-500</div>

        <h1 style="font-family:var(--font-display3); font-weight:800; font-size:100px; line-height:0.95; color:var(--color-accent); letter-spacing:-3.5px; text-align:center; white-space:nowrap;">
          Полусухая стяжка
        </h1>
        <h1 style="font-family:var(--font-display3); font-weight:800; font-size:100px; line-height:0.95; color:var(--color-accent); letter-spacing:-3.5px; text-align:center; white-space:nowrap; margin-top:6px;">
          пола
        </h1>

        <hr style="width:120px; height:3px; background:var(--color-cream); opacity:0.5; border:0; margin:34px 0 28px; border-radius:2px;">

        <div style="font-size:30px; opacity:0.9; letter-spacing:0.3px;">толщина 50–100 мм · готова за 1 день</div>
      </div>
    </main>

    <!-- ПРЕИМУЩЕСТВА -->
    <div style="flex:0 0 auto; display:flex; gap:30px; padding:0 72px 40px; position:relative; z-index:2;">

      <div style="flex:1 1 0; background:rgba(250,250,248,0.08); border:1px solid rgba(250,250,248,0.2); border-radius:14px; padding:20px 22px; display:flex; align-items:center; gap:18px;">
        <div style="flex-shrink:0; width:44px; height:44px; background:var(--color-accent); border-radius:50%; display:grid; place-items:center;">
          <svg viewBox="0 0 22 22" style="width:22px; height:22px;"><polyline points="3,11 9,17 19,5" fill="none" stroke="#1A1A1A" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div style="display:flex; flex-direction:column;">
          <div style="font-weight:800; font-size:27px; color:var(--color-cream); line-height:1.1;">За 1 день</div>
          <div style="font-size:15px; color:rgba(250,250,248,0.75); margin-top:4px;">приходим утром, уходим вечером</div>
        </div>
      </div>

      <div style="flex:1 1 0; background:rgba(250,250,248,0.08); border:1px solid rgba(250,250,248,0.2); border-radius:14px; padding:20px 22px; display:flex; align-items:center; gap:18px;">
        <div style="flex-shrink:0; width:44px; height:44px; background:var(--color-accent); border-radius:50%; display:grid; place-items:center;">
          <svg viewBox="0 0 22 22" style="width:22px; height:22px;"><polyline points="3,11 9,17 19,5" fill="none" stroke="#1A1A1A" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div style="display:flex; flex-direction:column;">
          <div style="font-weight:800; font-size:27px; color:var(--color-cream); line-height:1.1;">3 года</div>
          <div style="font-size:15px; color:rgba(250,250,248,0.75); margin-top:4px;">гарантии по договору</div>
        </div>
      </div>

      <div style="flex:1 1 0; background:rgba(250,250,248,0.08); border:1px solid rgba(250,250,248,0.2); border-radius:14px; padding:20px 22px; display:flex; align-items:center; gap:18px;">
        <div style="flex-shrink:0; width:44px; height:44px; background:var(--color-accent); border-radius:50%; display:grid; place-items:center;">
          <svg viewBox="0 0 22 22" style="width:22px; height:22px;"><polyline points="3,11 9,17 19,5" fill="none" stroke="#1A1A1A" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div style="display:flex; flex-direction:column;">
          <div style="font-weight:800; font-size:27px; color:var(--color-cream); line-height:1.1;">Замер бесплатно</div>
          <div style="font-size:15px; color:rgba(250,250,248,0.75); margin-top:4px;">приедем когда удобно</div>
        </div>
      </div>
    </div>

    <!-- НИЖНЯЯ ПОЛОСА со слоганом -->
    <footer style="flex:0 0 42px; background:var(--color-accent); position:relative; z-index:2; display:flex; align-items:center; justify-content:center;">
      <div style="font-weight:700; font-size:26px; color:var(--color-dark); letter-spacing:0.5px;">
        С 2017 года делаем ровную и надёжную стяжку в Москве и области
      </div>
    </footer>

  </div>
</div>

</body>
</html>
