<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
<defs>
  <!-- Shield clip path for coat of arms -->
  <clipPath id="coat-clip">
    <path d="M100,134 H366 V366 Q366,476 233,476 Q100,476 100,366Z"/>
  </clipPath>
</defs>

<!-- Dark background -->
<rect width="1080" height="1080" fill="#1A1A1A"/>

<!-- ===== HEADER: yellow brand band ===== -->
<rect x="0" y="0" width="1080" height="100" fill="#F5C518"/>

<!-- Level icon (уровень) — фирменный элемент -->
<rect x="28" y="22" width="150" height="56" rx="7" fill="#1A1A1A"/>
<rect x="87" y="22" width="32" height="56" fill="#F5C518"/>
<circle cx="103" cy="50" r="13" fill="#FAFAF8" stroke="#1A1A1A" stroke-width="2"/>
<circle cx="103" cy="50" r="6" fill="none" stroke="#1A1A1A" stroke-width="2"/>
<line x1="44" y1="22" x2="44" y2="35" stroke="#FAFAF8" stroke-width="2"/>
<line x1="58" y1="22" x2="58" y2="35" stroke="#FAFAF8" stroke-width="2"/>
<line x1="72" y1="22" x2="72" y2="35" stroke="#FAFAF8" stroke-width="2"/>
<line x1="131" y1="22" x2="131" y2="35" stroke="#FAFAF8" stroke-width="2"/>
<line x1="145" y1="22" x2="145" y2="35" stroke="#FAFAF8" stroke-width="2"/>
<line x1="159" y1="22" x2="159" y2="35" stroke="#FAFAF8" stroke-width="2"/>

<!-- МосСтяжка name -->
<text x="196" y="71" font-family="Arial Black, Arial, sans-serif" font-size="50" font-weight="900" fill="#1A1A1A" letter-spacing="-1">МосСтяжка</text>

<!-- Header right: мосстяжка.рф -->
<text x="820" y="51" font-family="Arial, sans-serif" font-size="18" fill="#1A1A1A" opacity="0.6" letter-spacing="3">ПОЛУСУХАЯ СТЯЖКА ПОЛА</text>
<text x="820" y="77" font-family="Arial Black, Arial, sans-serif" font-size="22" font-weight="900" fill="#1A1A1A">мосстяжка.рф</text>


<!-- ===== LEFT SIDE: ГЕРБ + ГОРОД ===== -->

<!-- Shield background (серебряный/белый) -->
<path d="M100,134 H366 V366 Q366,476 233,476 Q100,476 100,366Z" fill="#F0EDE4"/>

<!-- Blue chief (top ~32%) -->
<rect x="100" y="134" width="266" height="108" fill="#1B4E9B" clip-path="url(#coat-clip)"/>

<!-- 8-pointed star in blue chief, center (233, 188) -->
<g transform="translate(233,188)" clip-path="url(#coat-clip)">
  <polygon points="0,-28 7,-9.5 26,-9.5 12,3.5 17.5,23 0,12.5 -17.5,23 -12,3.5 -26,-9.5 -7,-9.5" fill="#F5C518"/>
</g>

<!-- Green pine tree in silver field -->
<g clip-path="url(#coat-clip)">
  <!-- Three tiers of tree crown -->
  <polygon points="233,252 200,296 266,296" fill="#27732A"/>
  <polygon points="233,270 190,326 276,326" fill="#27732A"/>
  <polygon points="233,288 178,360 288,360" fill="#27732A"/>
  <!-- Trunk -->
  <rect x="221" y="358" width="24" height="38" fill="#7A4520"/>
  <!-- Ground strip -->
  <rect x="130" y="393" width="206" height="10" fill="#27732A" opacity="0.45"/>
</g>

<!-- Shield gold border -->
<path d="M100,134 H366 V366 Q366,476 233,476 Q100,476 100,366Z" fill="none" stroke="#F5C518" stroke-width="5"/>

<!-- City name -->
<text x="233" y="546" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="52" font-weight="900" fill="#F5C518" letter-spacing="3">ОДИНЦОВО</text>
<text x="233" y="582" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" fill="#FAFAF8" opacity="0.5" letter-spacing="1.5">Московская область</text>

<!-- Subtle vertical divider -->
<line x1="474" y1="116" x2="474" y2="660" stroke="#F5C518" stroke-width="1" opacity="0.18"/>


<!-- ===== RIGHT SIDE: УСЛУГА + ПРЕИМУЩЕСТВА ===== -->

<!-- Service title -->
<text x="508" y="190" font-family="Arial Black, Arial, sans-serif" font-size="39" font-weight="900" fill="#FAFAF8">Полусухая стяжка</text>
<text x="508" y="236" font-family="Arial Black, Arial, sans-serif" font-size="39" font-weight="900" fill="#F5C518">пола</text>

<!-- Yellow separator line -->
<rect x="508" y="254" width="196" height="4" fill="#F5C518" rx="2"/>

<!-- Benefit 1: за 1 день -->
<rect x="508" y="278" width="7" height="66" rx="3.5" fill="#F5C518"/>
<text x="530" y="311" font-family="Arial Black, Arial, sans-serif" font-size="31" font-weight="900" fill="#FAFAF8">за 1 рабочий день</text>
<text x="530" y="338" font-family="Arial, sans-serif" font-size="19" fill="#FAFAF8" opacity="0.5">приходим утром — уходим вечером</text>

<!-- Benefit 2: гарантия -->
<rect x="508" y="362" width="7" height="66" rx="3.5" fill="#F5C518"/>
<text x="530" y="395" font-family="Arial Black, Arial, sans-serif" font-size="31" font-weight="900" fill="#FAFAF8">гарантия 3 года</text>
<text x="530" y="422" font-family="Arial, sans-serif" font-size="19" fill="#FAFAF8" opacity="0.5">закреплена в договоре</text>

<!-- Benefit 3: замер -->
<rect x="508" y="446" width="7" height="66" rx="3.5" fill="#F5C518"/>
<text x="530" y="479" font-family="Arial Black, Arial, sans-serif" font-size="31" font-weight="900" fill="#FAFAF8">замер бесплатно</text>
<text x="530" y="506" font-family="Arial, sans-serif" font-size="19" fill="#FAFAF8" opacity="0.5">на любой адрес в зоне выезда</text>

<!-- Benefit 4: цена — yellow box -->
<rect x="508" y="528" width="548" height="68" rx="8" fill="#F5C518"/>
<text x="534" y="556" font-family="Arial, sans-serif" font-size="22" fill="#1A1A1A" opacity="0.7">Цена:</text>
<text x="622" y="556" font-family="Arial Black, Arial, sans-serif" font-size="32" font-weight="900" fill="#1A1A1A">от 700 ₽/м²</text>
<text x="534" y="585" font-family="Arial, sans-serif" font-size="18" fill="#1A1A1A" opacity="0.65">толщина 40–80 мм, под любое покрытие</text>

<!-- Phone number box (outlined) -->
<rect x="508" y="614" width="548" height="62" rx="8" fill="none" stroke="#F5C518" stroke-width="2.5"/>
<text x="782" y="655" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="34" font-weight="900" fill="#FAFAF8">+7 985 302-70-25</text>


<!-- ===== HORIZONTAL DIVIDER ===== -->
<rect x="0" y="694" width="1080" height="2" fill="#F5C518" opacity="0.22"/>


<!-- ===== BOTTOM: СХЕМА СТЯЖКИ ===== -->

<!-- Section label -->
<text x="54" y="736" font-family="Arial, sans-serif" font-size="20" fill="#F5C518" letter-spacing="2.5" opacity="0.65">ЧТО ТАКОЕ ПОЛУСУХАЯ СТЯЖКА</text>

<!-- Floor layers cross-section (слева направо снизу вверх) -->

<!-- Плита перекрытия (concrete slab) -->
<rect x="54" y="940" width="640" height="52" fill="#6A6560" rx="3"/>
<!-- Texture: criss-cross lines -->
<line x1="90" y1="940" x2="90" y2="992" stroke="#7A7570" stroke-width="1.5" opacity="0.5"/>
<line x1="140" y1="940" x2="140" y2="992" stroke="#7A7570" stroke-width="1.5" opacity="0.5"/>
<line x1="190" y1="940" x2="190" y2="992" stroke="#7A7570" stroke-width="1.5" opacity="0.5"/>
<line x1="240" y1="940" x2="240" y2="992" stroke="#7A7570" stroke-width="1.5" opacity="0.5"/>
<line x1="290" y1="940" x2="290" y2="992" stroke="#7A7570" stroke-width="1.5" opacity="0.5"/>
<line x1="340" y1="940" x2="340" y2="992" stroke="#7A7570" stroke-width="1.5" opacity="0.5"/>
<line x1="390" y1="940" x2="390" y2="992" stroke="#7A7570" stroke-width="1.5" opacity="0.5"/>
<line x1="440" y1="940" x2="440" y2="992" stroke="#7A7570" stroke-width="1.5" opacity="0.5"/>
<line x1="490" y1="940" x2="490" y2="992" stroke="#7A7570" stroke-width="1.5" opacity="0.5"/>
<line x1="540" y1="940" x2="540" y2="992" stroke="#7A7570" stroke-width="1.5" opacity="0.5"/>
<line x1="590" y1="940" x2="590" y2="992" stroke="#7A7570" stroke-width="1.5" opacity="0.5"/>
<line x1="640" y1="940" x2="640" y2="992" stroke="#7A7570" stroke-width="1.5" opacity="0.5"/>
<text x="710" y="972" font-family="Arial, sans-serif" font-size="17" fill="#888">плита перекрытия</text>

<!-- Стяжка (semi-dry screed body) -->
<rect x="54" y="846" width="640" height="92" fill="#C6BA9E" rx="3"/>
<!-- Fiber texture hints -->
<line x1="100" y1="860" x2="180" y2="875" stroke="#B8AA8E" stroke-width="1" opacity="0.6"/>
<line x1="200" y1="870" x2="300" y2="858" stroke="#B8AA8E" stroke-width="1" opacity="0.6"/>
<line x1="320" y1="862" x2="420" y2="876" stroke="#B8AA8E" stroke-width="1" opacity="0.6"/>
<line x1="440" y1="872" x2="560" y2="860" stroke="#B8AA8E" stroke-width="1" opacity="0.6"/>
<line x1="580" y1="864" x2="660" y2="878" stroke="#B8AA8E" stroke-width="1" opacity="0.6"/>
<text x="710" y="886" font-family="Arial, sans-serif" font-size="17" fill="#C6BA9E">стяжка 40–80 мм</text>
<text x="710" y="908" font-family="Arial, sans-serif" font-size="15" fill="#666">М-500 + фиброволокно</text>
<text x="710" y="928" font-family="Arial, sans-serif" font-size="15" fill="#666">+ демпферная лента</text>

<!-- Smooth top surface of screed -->
<rect x="54" y="840" width="640" height="8" fill="#D8CEAC" rx="2"/>

<!-- Правило (leveling tool) being dragged over surface -->
<rect x="74" y="820" width="560" height="22" rx="6" fill="#F5C518" opacity="0.88"/>
<!-- Handles -->
<rect x="60" y="824" width="18" height="14" rx="3" fill="#E8B800"/>
<rect x="626" y="824" width="18" height="14" rx="3" fill="#E8B800"/>
<!-- Direction arrow -->
<line x1="700" y1="831" x2="728" y2="831" stroke="#FAFAF8" stroke-width="2" opacity="0.45"/>
<polygon points="728,826 738,831 728,836" fill="#FAFAF8" opacity="0.45"/>

<!-- Финишное покрытие (user's own, shown as dashed outline) -->
<rect x="54" y="806" width="640" height="16" fill="#FAFAF8" opacity="0.04" rx="2" stroke="#FAFAF8" stroke-width="1.5" stroke-dasharray="8,4"/>
<text x="710" y="819" font-family="Arial, sans-serif" font-size="14" fill="#555">финишное покрытие (ваше)</text>

<!-- Dimension bracket left side -->
<line x1="34" y1="846" x2="34" y2="938" stroke="#FAFAF8" stroke-width="1.5" opacity="0.35"/>
<line x1="27" y1="846" x2="41" y2="846" stroke="#FAFAF8" stroke-width="1.5" opacity="0.35"/>
<line x1="27" y1="938" x2="41" y2="938" stroke="#FAFAF8" stroke-width="1.5" opacity="0.35"/>


<!-- ===== BOTTOM YELLOW STRIP ===== -->
<rect x="0" y="1050" width="1080" height="30" fill="#F5C518"/>
<text x="540" y="1071" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="20" font-weight="900" fill="#1A1A1A" letter-spacing="0.5">РАБОТАЕМ С 2017 ГОДА  •  МосСтяжка.рф  •  +7 985 302-70-25</text>

</svg>
