<svg width="1080" height="1080" viewBox="0 0 1080 1080"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink">

<defs>
  <!-- (defs зарезервировано) -->
</defs>


<!-- ████ ФОН: фоллбэк-цвет на случай если фото не загрузится ████ -->
<rect width="1080" height="1080" fill="#4D4D4D"/>

<!-- ████ ФОТО ФОН: реальная стяжка ████ -->
<image href="screed-photo.jpg" xlink:href="screed-photo.jpg"
       x="0" y="0" width="1080" height="1080"
       preserveAspectRatio="xMidYMid slice"/>

<!-- ████ ТЁМНЫЙ ОВЕРЛЕЙ: чтобы текст читался ████ -->
<rect width="1080" height="1080" fill="#2A2A2A" opacity="0.68"/>


<!-- ████ ВЕРХНЯЯ ЖЁЛТАЯ ПОЛОСА (логотип компании) ████ -->
<rect x="0" y="0" width="1080" height="86" fill="#F5C518"/>

<!-- Иконка строительного уровня -->
<rect x="22" y="16" width="138" height="54" rx="7" fill="#2E2E2E"/>
<rect x="76" y="16" width="32" height="54" fill="#F5C518"/>
<circle cx="92" cy="43" r="12" fill="#FAFAF8" stroke="#2E2E2E" stroke-width="2"/>
<circle cx="92" cy="43" r="5"  fill="none"   stroke="#2E2E2E" stroke-width="2"/>
<line x1="36"  y1="16" x2="36"  y2="28" stroke="#FAFAF8" stroke-width="2"/>
<line x1="48"  y1="16" x2="48"  y2="28" stroke="#FAFAF8" stroke-width="2"/>
<line x1="60"  y1="16" x2="60"  y2="28" stroke="#FAFAF8" stroke-width="2"/>
<line x1="122" y1="16" x2="122" y2="28" stroke="#FAFAF8" stroke-width="2"/>
<line x1="134" y1="16" x2="134" y2="28" stroke="#FAFAF8" stroke-width="2"/>
<line x1="146" y1="16" x2="146" y2="28" stroke="#FAFAF8" stroke-width="2"/>

<text x="172" y="60"
  font-family="Arial Black, Arial, sans-serif"
  font-size="46" font-weight="900" fill="#2E2E2E" letter-spacing="-1">МосСтяжка</text>

<!-- Справа: тэглайн обычным регистром, без домена и телефона -->
<text x="1058" y="40" text-anchor="end"
  font-family="Arial, sans-serif"
  font-size="15" fill="#2E2E2E" opacity="0.78">профессионально стягиваем</text>
<text x="1058" y="64" text-anchor="end"
  font-family="Arial, sans-serif"
  font-size="15" fill="#2E2E2E" opacity="0.78">с 2017 года</text>


<!-- ████████████████████████████████████
     БЛОК ГОРОДА: ГЕРБ + НАЗВАНИЕ
     ↓↓↓ МЕНЯЕТСЯ ДЛЯ КАЖДОГО ГОРОДА ↓↓↓
     ████████████████████████████████████ -->

<!-- Герб города — реальный PNG из /assets/banners/ (без маски — пользователь обработает сам) -->
<image href="banners/odintsovo.png" xlink:href="banners/odintsovo.png"
       x="60" y="100" width="180" height="226"
       preserveAspectRatio="xMidYMid meet"/>

<!-- Название города — обычный регистр, чуть скромнее (акцент уходит на стяжку) -->
<text x="272" y="208"
  font-family="Arial Black, Arial, sans-serif"
  font-size="82" font-weight="900" fill="#F5C518" letter-spacing="-1">Одинцово</text>

<text x="272" y="252"
  font-family="Arial, sans-serif"
  font-size="22" fill="#FAFAF8" opacity="0.78">Московская область</text>
<text x="272" y="284"
  font-family="Arial, sans-serif"
  font-size="18" fill="#FAFAF8" opacity="0.6">приезжаем в любую точку — до 150 км от МКАД</text>

<!-- ↑↑↑ КОНЕЦ БЛОКА ГОРОДА ↑↑↑ -->


<!-- ████████████████████████████████████
     ГЛАВНЫЙ ВИЗУАЛ: РАЗРЕЗ СТЯЖКИ
     Название услуги — только здесь, внутри слоя
     («объект объявления — главный элемент»)
     ████████████████████████████████████ -->

<!-- Финишное покрытие — солидный слой (ламинат / паркет / плитка) -->
<rect x="80" y="378" width="920" height="34" rx="3" fill="#A87856"/>
<!-- Тонкие линии — намёк на стыки планок -->
<line x1="270" y1="378" x2="270" y2="412" stroke="#8B6444" stroke-width="1.2" opacity="0.5"/>
<line x1="460" y1="378" x2="460" y2="412" stroke="#8B6444" stroke-width="1.2" opacity="0.5"/>
<line x1="650" y1="378" x2="650" y2="412" stroke="#8B6444" stroke-width="1.2" opacity="0.5"/>
<line x1="840" y1="378" x2="840" y2="412" stroke="#8B6444" stroke-width="1.2" opacity="0.5"/>
<text x="540" y="402" text-anchor="middle"
  font-family="Arial, sans-serif"
  font-size="15" fill="#FAFAF8" opacity="0.9">финишное покрытие — плитка, ламинат, паркет</text>

<!-- Стяжка — главный слой, разумная пропорция (200px вместо 370px) -->
<rect x="80" y="416" width="920" height="200" fill="#C6BA9E" rx="4"/>

<!-- Текстура: намёк на фиброволокно -->
<line x1="170" y1="445" x2="270" y2="438" stroke="#A89B7C" stroke-width="1" opacity="0.5"/>
<line x1="310" y1="442" x2="410" y2="450" stroke="#A89B7C" stroke-width="1" opacity="0.5"/>
<line x1="460" y1="448" x2="560" y2="438" stroke="#A89B7C" stroke-width="1" opacity="0.5"/>
<line x1="610" y1="441" x2="710" y2="450" stroke="#A89B7C" stroke-width="1" opacity="0.5"/>
<line x1="760" y1="447" x2="860" y2="439" stroke="#A89B7C" stroke-width="1" opacity="0.5"/>
<line x1="160" y1="590" x2="270" y2="598" stroke="#A89B7C" stroke-width="1" opacity="0.45"/>
<line x1="310" y1="595" x2="410" y2="585" stroke="#A89B7C" stroke-width="1" opacity="0.45"/>
<line x1="450" y1="588" x2="560" y2="598" stroke="#A89B7C" stroke-width="1" opacity="0.45"/>
<line x1="600" y1="595" x2="710" y2="585" stroke="#A89B7C" stroke-width="1" opacity="0.45"/>
<line x1="750" y1="588" x2="860" y2="598" stroke="#A89B7C" stroke-width="1" opacity="0.45"/>

<!-- Заголовок внутри стяжки — главный акцент картинки -->
<text x="540" y="510" text-anchor="middle"
  font-family="Arial Black, Arial, sans-serif"
  font-size="76" font-weight="900" fill="#1A1A1A" letter-spacing="-1.5">Полусухая стяжка пола</text>

<!-- Подпись материалов (толщина теперь здесь) -->
<text x="540" y="558" text-anchor="middle"
  font-family="Arial, sans-serif"
  font-size="18" fill="#2A2A2A" opacity="0.72">толщина 40–80 мм · М-500 · фиброволокно · по СНиП</text>

<!-- Плита перекрытия — компактная (60px) -->
<rect x="80" y="620" width="920" height="60" fill="#363636" rx="4"/>
<line x1="120" y1="620" x2="120" y2="680" stroke="#4A4A4A" stroke-width="1.5" opacity="0.6"/>
<line x1="200" y1="620" x2="200" y2="680" stroke="#4A4A4A" stroke-width="1.5" opacity="0.6"/>
<line x1="280" y1="620" x2="280" y2="680" stroke="#4A4A4A" stroke-width="1.5" opacity="0.6"/>
<line x1="360" y1="620" x2="360" y2="680" stroke="#4A4A4A" stroke-width="1.5" opacity="0.6"/>
<line x1="440" y1="620" x2="440" y2="680" stroke="#4A4A4A" stroke-width="1.5" opacity="0.6"/>
<line x1="520" y1="620" x2="520" y2="680" stroke="#4A4A4A" stroke-width="1.5" opacity="0.6"/>
<line x1="600" y1="620" x2="600" y2="680" stroke="#4A4A4A" stroke-width="1.5" opacity="0.6"/>
<line x1="680" y1="620" x2="680" y2="680" stroke="#4A4A4A" stroke-width="1.5" opacity="0.6"/>
<line x1="760" y1="620" x2="760" y2="680" stroke="#4A4A4A" stroke-width="1.5" opacity="0.6"/>
<line x1="840" y1="620" x2="840" y2="680" stroke="#4A4A4A" stroke-width="1.5" opacity="0.6"/>
<line x1="920" y1="620" x2="920" y2="680" stroke="#4A4A4A" stroke-width="1.5" opacity="0.6"/>
<text x="540" y="657" text-anchor="middle"
  font-family="Arial, sans-serif"
  font-size="14" fill="#A8A8A8">плита перекрытия</text>


<!-- ████████████████████████████████████
     ТРИ ПРЕИМУЩЕСТВА — обычный регистр
     ████████████████████████████████████ -->

<g transform="translate(80, 760)">
  <circle cx="22" cy="22" r="22" fill="none" stroke="#F5C518" stroke-width="3"/>
  <polyline points="11,23 19,31 33,15" fill="none" stroke="#F5C518" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="58" y="20" font-family="Arial Black, Arial, sans-serif" font-size="22" font-weight="900" fill="#FAFAF8">За 1 рабочий день</text>
  <text x="58" y="42" font-family="Arial, sans-serif" font-size="14" fill="#FAFAF8" opacity="0.6">приходим утром, уходим вечером</text>
</g>

<g transform="translate(420, 760)">
  <circle cx="22" cy="22" r="22" fill="none" stroke="#F5C518" stroke-width="3"/>
  <polyline points="11,23 19,31 33,15" fill="none" stroke="#F5C518" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="58" y="20" font-family="Arial Black, Arial, sans-serif" font-size="22" font-weight="900" fill="#FAFAF8">Гарантия 3 года</text>
  <text x="58" y="42" font-family="Arial, sans-serif" font-size="14" fill="#FAFAF8" opacity="0.6">закреплена в договоре</text>
</g>

<g transform="translate(760, 760)">
  <circle cx="22" cy="22" r="22" fill="none" stroke="#F5C518" stroke-width="3"/>
  <polyline points="11,23 19,31 33,15" fill="none" stroke="#F5C518" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="58" y="20" font-family="Arial Black, Arial, sans-serif" font-size="22" font-weight="900" fill="#FAFAF8">Замер бесплатно</text>
  <text x="58" y="42" font-family="Arial, sans-serif" font-size="14" fill="#FAFAF8" opacity="0.6">в день обращения</text>
</g>


<!-- ████████████████████████████████████
     НИЖНЯЯ ЖЁЛТАЯ ПОЛОСА: локация + доверие
     ████████████████████████████████████ -->
<rect x="0" y="950" width="1080" height="130" fill="#F5C518"/>
<text x="540" y="1005" text-anchor="middle"
  font-family="Arial Black, Arial, sans-serif"
  font-size="40" font-weight="900" fill="#2E2E2E" letter-spacing="-0.5">Одинцово · Московская область</text>
<text x="540" y="1050" text-anchor="middle"
