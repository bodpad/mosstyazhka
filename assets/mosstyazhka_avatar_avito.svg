        <line x1="145" y1="125" x2="145" y2="145" stroke="#1A1A1A" stroke-width="2"/>
        <line x1="165" y1="125" x2="165" y2="145" stroke="#1A1A1A" stroke-width="2"/>
        <line x1="185" y1="125" x2="185" y2="145" stroke="#1A1A1A" stroke-width="2"/>
        <line x1="315" y1="125" x2="315" y2="145" stroke="#1A1A1A" stroke-width="2"/>
